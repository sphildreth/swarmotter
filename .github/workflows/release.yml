name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  RELEASE_RUST_IMAGE: rust:1.96.1-bookworm
  RELEASE_GLIBC_MAX: "2.36"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Check
        run: cargo check --workspace --all-targets --all-features
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all --all-features

  linux-artifacts:
    name: Linux ${{ matrix.arch }} artifacts
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            nfpm_arch: amd64
            rust_target: x86_64-unknown-linux-gnu
          - arch: aarch64
            nfpm_arch: arm64
            rust_target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v7

      - name: Derive release version
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Native release artifacts require a stable vX.Y.Z tag."
            exit 1
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build release binary in Debian bookworm
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/src" \
            -w /src \
            -e RUST_TARGET="${{ matrix.rust_target }}" \
            -e SWARMOTTER_BUILD_COMMIT="${{ github.sha }}" \
            "${RELEASE_RUST_IMAGE}" \
            bash -lc '
              set -Eeuo pipefail
              rustup target add "$RUST_TARGET"
              if [[ "$RUST_TARGET" == "aarch64-unknown-linux-gnu" ]]; then
                apt-get update
                apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross
                export AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar
                export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
                export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
              fi
              mkdir -p dist/binary dist/packages
              cargo build --locked --release --target "$RUST_TARGET" --bin swarmotterd
              install -m 0755 "target/$RUST_TARGET/release/swarmotterd" dist/binary/swarmotterd
            '
          sudo chown -R "$(id -u):$(id -g)" dist target

      - name: Verify release binary glibc compatibility
        run: |
          max_glibc="$(
            strings dist/binary/swarmotterd \
              | grep -Eo 'GLIBC_[0-9]+[.][0-9]+' \
              | sed 's/^GLIBC_//' \
              | sort -Vu \
              | tail -n 1
          )"
          if [[ -z "$max_glibc" ]]; then
            echo "::error::Could not determine required glibc version for release binary."
            exit 1
          fi
          echo "Release binary requires glibc <= ${max_glibc}; allowed max is ${RELEASE_GLIBC_MAX}"
          if dpkg --compare-versions "$max_glibc" gt "$RELEASE_GLIBC_MAX"; then
            echo "::error::Release binary requires glibc ${max_glibc}, newer than allowed ${RELEASE_GLIBC_MAX}."
            exit 1
          fi

      - name: Package tarball
        run: |
          version="${{ steps.version.outputs.version }}"
          arch="${{ matrix.arch }}"
          root="swarmotter-v${version}-linux-${arch}"
          stage="dist/${root}"

          mkdir -p "${stage}/bin" "${stage}/config" "${stage}/deploy" "${stage}/docs"
          install -m 0755 dist/binary/swarmotterd "${stage}/bin/swarmotterd"
          cp LICENSE README.md CHANGELOG.md THIRD_PARTY_LICENSES.md "${stage}/"
          cp config/swarmotter.toml.example config/swarmotter.container.toml.example "${stage}/config/"
          cp deploy/.env.example deploy/compose.yml deploy/gluetun.env.example deploy/swarmotterd.service "${stage}/deploy/"
          cp docs/SUMMARY.md docs/api.md docs/configuration.md docs/deployment.md docs/getting-started.md docs/index.md docs/lawful-use.md docs/legal.md docs/network-containment.md docs/troubleshooting.md docs/web-ui.md "${stage}/docs/"
          cp -R docs/assets "${stage}/docs/assets"

          tar -C dist -czf "dist/packages/${root}.tar.gz" "${root}"

      - name: Render nFPM config
        run: |
          sed \
            -e "s|@NFPM_ARCH@|${{ matrix.nfpm_arch }}|g" \
            -e "s|@SWARMOTTER_VERSION@|${{ steps.version.outputs.version }}|g" \
            -e "s|@SWARMOTTER_BINARY@|${GITHUB_WORKSPACE}/dist/binary/swarmotterd|g" \
            deploy/nfpm.yaml > dist/nfpm.yaml

      - name: Package deb
        run: go run github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.47.0 package --config dist/nfpm.yaml --packager deb --target dist/packages

      - name: Package rpm
        run: go run github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.47.0 package --config dist/nfpm.yaml --packager rpm --target dist/packages

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-artifacts
          if-no-files-found: error
          path: |
            dist/packages/*.tar.gz
            dist/packages/*.deb
            dist/packages/*.rpm

  container-image:
    runs-on: ubuntu-latest
    needs: linux-artifacts
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Derive release version
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Container release tags require a stable vX.Y.Z tag."
            exit 1
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          path: image-artifacts
          pattern: linux-*-artifacts
          merge-multiple: true

      - name: Stage image binaries
        run: |
          version="${{ steps.version.outputs.version }}"
          mkdir -p image-binaries/linux-amd64 image-binaries/linux-arm64
          mkdir -p /tmp/swarmotter-release-extract

          tar -xzf "image-artifacts/swarmotter-v${version}-linux-x86_64.tar.gz" -C /tmp/swarmotter-release-extract
          install -m 0755 "/tmp/swarmotter-release-extract/swarmotter-v${version}-linux-x86_64/bin/swarmotterd" image-binaries/linux-amd64/swarmotterd

          tar -xzf "image-artifacts/swarmotter-v${version}-linux-aarch64.tar.gz" -C /tmp/swarmotter-release-extract
          install -m 0755 "/tmp/swarmotter-release-extract/swarmotter-v${version}-linux-aarch64/bin/swarmotterd" image-binaries/linux-arm64/swarmotterd

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build timestamp
        id: build_timestamp
        run: echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and publish image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: deploy/Dockerfile
          target: runtime-prebuilt
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SWARMOTTER_BUILD_COMMIT=${{ github.sha }}
            SWARMOTTER_IMAGE_CREATED=${{ steps.build_timestamp.outputs.created }}
            SWARMOTTER_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=release-container-image
          cache-to: type=gha,mode=max,scope=release-container-image
          provenance: true
          sbom: true

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - linux-artifacts
      - container-image
    permissions:
      contents: write
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: linux-*-artifacts
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p release-assets-flat
          find release-assets -type f \( -name '*.tar.gz' -o -name '*.deb' -o -name '*.rpm' \) -exec cp '{}' release-assets-flat/ \;
          cd release-assets-flat
          find . -maxdepth 1 -type f -printf '%P\0' | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets-flat/*
